name: iOS IPA Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ios-ipa-build.yml"
      - "build.gradle.kts"
      - "composeApp/**"
      - "gradle/**"
      - "gradle.properties"
      - "gradlew"
      - "iosApp/**"
      - "kokoro-assets-runtime/**"
      - "local.defaults.properties"
      - "settings.gradle.kts"

permissions:
  contents: write

jobs:
  build-ios:
    name: Build signed iPhone IPA
    runs-on: macos-15
    env:
      IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
      IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_CLOUD_API_KEY: ${{ secrets.GROQ_CLOUD_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check signing secrets
        id: signing
        run: |
          missing=0
          for name in \
            IOS_BUNDLE_ID \
            IOS_CERTIFICATE_P12_BASE64 \
            IOS_CERTIFICATE_PASSWORD \
            IOS_PROVISIONING_PROFILE_BASE64 \
            IOS_PROVISIONING_PROFILE_NAME \
            IOS_TEAM_ID
          do
            if [ -z "${!name}" ]; then
              echo "::warning::$name is required for a signed installable iPhone IPA."
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "can_sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_sign=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -z "$IOS_EXPORT_METHOD" ]; then
            echo "IOS_EXPORT_METHOD was not set; defaulting to ad-hoc."
            echo "IOS_EXPORT_METHOD=ad-hoc" >> "$GITHUB_ENV"
          fi
          if [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "KEYCHAIN_PASSWORD=$(uuidgen)" >> "$GITHUB_ENV"
          fi

      - name: Normalize optional build secrets
        run: |
          set -euo pipefail
          if [ -z "${GROQ_API_KEY:-}" ] && [ -n "${GROQ_CLOUD_API_KEY:-}" ]; then
            echo "GROQ_API_KEY=$GROQ_CLOUD_API_KEY" >> "$GITHUB_ENV"
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Set up JDK for Kotlin/Native
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Bootstrap Xcode project for CocoaPods
        run: cd iosApp && xcodegen generate --spec project.yml

      - name: Download ONNX Runtime iOS Framework
        run: |
          cat << 'EOF' > Podfile
          platform :ios, '16.0'
          project 'iosApp/AnimeNovelManga.xcodeproj'
          target 'AnimeNovelManga' do
            pod 'onnxruntime-c', '1.17.1'
          end
          EOF
          pod install
          mv Pods/onnxruntime-c/onnxruntime.xcframework iosApp/onnxruntime.xcframework
          rm -rf Podfile Podfile.lock Pods AnimeNovelManga.xcworkspace

      - name: Generate Xcode project
        run: cd iosApp && xcodegen generate --spec project.yml

      - name: Install Apple signing assets
        if: steps.signing.outputs.can_sign == 'true'
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/ios_distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/NovelApp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/ios-build.keychain-db"

          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH" 2>/dev/null \
            || echo "$IOS_CERTIFICATE_P12_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH" 2>/dev/null \
            || echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/NovelApp.mobileprovision"

      - name: Build unsigned iPhone app for compile check
        if: steps.signing.outputs.can_sign != 'true'
        run: |
          set -euo pipefail
          mkdir -p build/ios

          xcodebuild \
            -project iosApp/AnimeNovelManga.xcodeproj \
            -scheme AnimeNovelManga \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ios/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Package unsigned IPA artifact
        if: steps.signing.outputs.can_sign != 'true'
        run: |
          set -euo pipefail

          APP_PATH="build/ios/DerivedData/Build/Products/Release-iphoneos/AnimeNovelManga.app"
          IPA_PATH="build/ios/novelapp-ios-unsigned.ipa"

          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Unsigned app bundle was not found at $APP_PATH"
            find build/ios/DerivedData/Build/Products -maxdepth 3 -type d -name "*.app" -print || true
            exit 1
          fi

          rm -rf build/ios/unsigned-payload
          mkdir -p build/ios/unsigned-payload/Payload
          cp -R "$APP_PATH" build/ios/unsigned-payload/Payload/AnimeNovelManga.app
          (cd build/ios/unsigned-payload && zip -qry "../novelapp-ios-unsigned.ipa" Payload)

          echo "Unsigned IPA created at $IPA_PATH"
          echo "::notice::Unsigned IPA artifact created. It is useful for inspection/testing, but an iPhone still needs a signed IPA to install normally."

      - name: Upload unsigned IPA artifact
        if: steps.signing.outputs.can_sign != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: novelapp-ios-unsigned-ipa
          path: build/ios/novelapp-ios-unsigned.ipa

      - name: Publish unsigned IPA to Render site folder
        if: steps.signing.outputs.can_sign != 'true'
        run: |
          set -euo pipefail
          mkdir -p site/downloads
          cp build/ios/novelapp-ios-unsigned.ipa site/downloads/novelapp-ios.ipa
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/downloads/novelapp-ios.ipa
          if git diff --cached --quiet; then
            echo "No unsigned iOS IPA change to commit."
          else
            git commit -m "Publish unsigned iOS release [skip ci]"
            git push
          fi

      - name: Archive iPhone app
        if: steps.signing.outputs.can_sign == 'true'
        run: |
          set -euo pipefail
          mkdir -p build/ios

          xcodebuild \
            -project iosApp/AnimeNovelManga.xcodeproj \
            -scheme AnimeNovelManga \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/ios/AnimeNovelManga.xcarchive \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_NAME" \
            clean archive

      - name: Export signed IPA
        if: steps.signing.outputs.can_sign == 'true'
        run: |
          set -euo pipefail

          cat > build/ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${IOS_EXPORT_METHOD}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${IOS_PROVISIONING_PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath build/ios/AnimeNovelManga.xcarchive \
            -exportPath build/ios/export \
            -exportOptionsPlist build/ios/ExportOptions.plist

          mkdir -p site/downloads
          cp build/ios/export/*.ipa site/downloads/novelapp-ios.ipa

      - name: Upload IPA artifact
        if: steps.signing.outputs.can_sign == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: novelapp-ios-ipa
          path: site/downloads/novelapp-ios.ipa

      - name: Publish IPA to Render site folder
        if: steps.signing.outputs.can_sign == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/downloads/novelapp-ios.ipa
          if git diff --cached --quiet; then
            echo "No iOS IPA change to commit."
          else
            git commit -m "Publish iOS release [skip ci]"
            git push
          fi
