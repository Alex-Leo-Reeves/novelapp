name: Build Windows desktop app

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/windows-desktop-build.yml"
      - "build.gradle.kts"
      - "composeApp/**"
      - "gradle/**"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
      - "local.defaults.properties"
      - "settings.gradle.kts"

permissions:
  contents: write

jobs:
  windows-msi:
    name: Build Windows MSI
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Enable long paths
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
            choco install wixtoolset --no-progress -y
          }

          $wixRoot = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory -Filter "WiX Toolset*" |
            Sort-Object Name -Descending |
            Select-Object -First 1

          if ($wixRoot) {
            Join-Path $wixRoot.FullName "bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Build release MSI
        shell: pwsh
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
          RAPID_API_HOST: ${{ secrets.RAPID_API_HOST }}
          MANGADEX_CLIENT_ID: ${{ secrets.MANGADEX_CLIENT_ID }}
          MANGADEX_CLIENT_SECRET: ${{ secrets.MANGADEX_CLIENT_SECRET }}
          MANGADEX_USERNAME: ${{ secrets.MANGADEX_USERNAME }}
          MANGADEX_PASSWORD: ${{ secrets.MANGADEX_PASSWORD }}
        run: .\gradlew.bat --no-daemon :composeApp:packageReleaseMsi --stacktrace

      - name: Copy MSI to website downloads
        id: copy-msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "composeApp/build" -Recurse -Filter "*.msi" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $msi) {
            throw "Windows MSI was not produced."
          }

          New-Item -ItemType Directory -Force -Path "site/downloads" | Out-Null
          Copy-Item $msi.FullName "site/downloads/novelapp-windows.msi" -Force
          "msi_path=site/downloads/novelapp-windows.msi" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload Windows MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: novelapp-windows-msi
          path: ${{ steps.copy-msi.outputs.msi_path }}
          if-no-files-found: error

      - name: Publish MSI to downloads
        if: github.ref_name == 'main'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/downloads/novelapp-windows.msi
          git diff --cached --quiet

          if ($LASTEXITCODE -eq 0) {
            Write-Host "No Windows MSI changes to publish."
          } else {
            git commit -m "Publish Windows desktop release [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}"
          }
