services:
    - type: web
      runtime: 'node'
      repo: https://github.com/Alex-Leo-Reeves/novelapp
      name: cinepro-core
      plan: free
      autoDeploy: true
      numInstances: 1
      rootDir: cinepro/core
      buildCommand: npm install && npm run build
      startCommand: npm run start

      envVars:
          - key: NODE_ENV
            value: 'production'
          - key: CACHE_TYPE
            value: 'memory'
          - key: PUBLIC_URL
            value: ''
          - key: STREMIO_ADDON
            value: 'true'
          - key: CORS_ORIGIN
            value: '*'
          - key: MCP_ENABLED
            value: 'true'
          - key: HOST
            value: '0.0.0.0'
          - key: TMDB_API_KEY
            sync: false
            value: f728f7197fc9c3a7dfb35d78478d7e8e
          - key: REDIS_PASSWORD
            sync: false
