services:
  - type: web
    name: novelapp
    runtime: node
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    disk:
      name: novelapp-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: NODE_ENV
        value: production
