<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NovelApp Promo Render</title>
  <style>
    :root {
      --bg: #050711;
      --panel: #101622;
      --panel-2: #151d2c;
      --text: #f6fbff;
      --muted: #9aa8b7;
      --accent: #42d6b5;
      --gold: #f8c44f;
      --pink: #ff5f99;
      --blue: #6ea8ff;
      --danger: #ff6b6b;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 8%, rgba(66, 214, 181, 0.22), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(255, 95, 153, 0.16), transparent 26%),
        linear-gradient(180deg, #070914 0%, #04060d 100%);
    }

    .poster {
      position: relative;
      width: 1080px;
      height: 1920px;
      padding: 70px 74px 54px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 34px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 20px;
      letter-spacing: 0;
    }

    .logo {
      width: 78px;
      height: 78px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #42d6b5, #6ea8ff);
      color: #061016;
      font-size: 44px;
      font-weight: 1000;
      box-shadow: 0 18px 50px rgba(66, 214, 181, 0.3);
    }

    .brand-name {
      font-size: 34px;
      font-weight: 900;
      line-height: 1.08;
    }

    .brand-sub {
      margin-top: 5px;
      color: var(--muted);
      font-size: 22px;
      font-weight: 650;
    }

    .hero-title {
      margin: 0;
      max-width: 820px;
      font-size: 78px;
      line-height: 0.98;
      font-weight: 1000;
      letter-spacing: 0;
    }

    .hero-copy {
      margin: 20px 0 0;
      max-width: 820px;
      color: #c9d3df;
      font-size: 30px;
      line-height: 1.3;
      font-weight: 580;
    }

    .phone-wrap {
      align-self: center;
      justify-self: center;
      width: 590px;
      height: 1120px;
      border-radius: 66px;
      padding: 20px;
      background: linear-gradient(145deg, #242c38, #06080f);
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.56);
    }

    .phone {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 50px;
      background: var(--bg);
      border: 2px solid rgba(255,255,255,0.08);
    }

    .status {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 34px;
      font-size: 18px;
      font-weight: 800;
      color: #e8f2fb;
    }

    .screen {
      height: calc(100% - 58px);
      padding: 22px 26px 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .screen-title {
      font-size: 38px;
      line-height: 1.08;
      font-weight: 950;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(66, 214, 181, 0.14);
      color: var(--accent);
      font-size: 16px;
      font-weight: 850;
      white-space: nowrap;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow: hidden;
      padding-bottom: 4px;
    }

    .tab {
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--panel);
      color: #c9d3df;
      font-size: 16px;
      font-weight: 800;
      white-space: nowrap;
    }

    .tab.active {
      background: var(--accent);
      color: #061016;
    }

    .search {
      height: 54px;
      border-radius: 16px;
      background: var(--panel);
      display: flex;
      align-items: center;
      padding: 0 18px;
      color: var(--muted);
      font-size: 18px;
      font-weight: 650;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .cover-card {
      min-height: 242px;
      border-radius: 18px;
      overflow: hidden;
      background: var(--panel);
      position: relative;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .cover-art {
      height: 168px;
      background:
        linear-gradient(135deg, rgba(66,214,181,0.2), rgba(110,168,255,0.18)),
        linear-gradient(145deg, #182034, #080b14);
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.92);
      font-size: 54px;
      font-weight: 1000;
    }

    .cover-body {
      padding: 12px 14px 14px;
    }

    .cover-title {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.14;
    }

    .cover-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
    }

    .reader-page {
      flex: 1;
      border-radius: 24px;
      background: #020305;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .manga-page {
      flex: 1;
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.05), transparent),
        #08090e;
      border: 1px solid rgba(255,255,255,0.08);
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 14px;
      padding: 18px;
    }

    .panel-art {
      border-radius: 14px;
      background:
        linear-gradient(140deg, rgba(66,214,181,0.2), transparent 55%),
        linear-gradient(30deg, rgba(255,95,153,0.18), transparent 60%),
        #151b28;
      position: relative;
      overflow: hidden;
    }

    .panel-art:before,
    .panel-art:after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
    }

    .panel-art:before {
      width: 190px;
      height: 190px;
      left: 36px;
      top: 40px;
    }

    .panel-art:after {
      width: 280px;
      height: 28px;
      right: 38px;
      bottom: 48px;
      transform: rotate(-10deg);
    }

    .reader-title {
      font-size: 28px;
      font-weight: 1000;
    }

    .reader-line {
      height: 18px;
      border-radius: 99px;
      background: rgba(255,255,255,0.15);
    }

    .reader-line.short { width: 72%; }
    .reader-line.mid { width: 86%; }
    .reader-line.hot { background: rgba(66,214,181,0.7); }

    .player {
      flex: 1;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.18), rgba(0,0,0,0.8)),
        linear-gradient(135deg, #1d2a3a, #080b14 70%);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 22px;
    }

    .play {
      align-self: center;
      margin-top: 260px;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--accent);
      color: #061016;
      display: grid;
      place-items: center;
      font-size: 44px;
      font-weight: 1000;
      box-shadow: 0 18px 45px rgba(66,214,181,0.32);
    }

    .servers {
      display: grid;
      gap: 10px;
    }

    .server {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 58px;
      padding: 12px 16px;
      border-radius: 16px;
      background: var(--panel);
      color: #e8f2fb;
      font-size: 18px;
      font-weight: 850;
    }

    .server.active {
      background: rgba(66,214,181,0.16);
      color: var(--accent);
      border: 1px solid rgba(66,214,181,0.35);
    }

    .profile {
      border-radius: 24px;
      padding: 22px;
      background: var(--panel);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(66,214,181,0.16);
      display: grid;
      place-items: center;
      color: var(--accent);
      font-size: 34px;
      font-weight: 1000;
    }

    .sync-list {
      display: grid;
      gap: 14px;
    }

    .sync-row {
      min-height: 76px;
      padding: 16px 18px;
      border-radius: 18px;
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 18px;
      font-weight: 850;
    }

    .progress-box {
      border-radius: 24px;
      background: var(--panel);
      padding: 24px;
      display: grid;
      gap: 16px;
    }

    .progress-track {
      height: 16px;
      border-radius: 99px;
      background: rgba(255,255,255,0.12);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 72%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--blue));
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .download {
      padding: 18px 24px;
      border-radius: 18px;
      background: var(--accent);
      color: #061016;
      font-size: 24px;
      font-weight: 1000;
      white-space: nowrap;
    }

    .url {
      color: #d8e2ee;
      font-size: 24px;
      font-weight: 850;
      text-align: right;
    }

    .mini-caption {
      color: var(--muted);
      font-size: 19px;
      font-weight: 750;
    }
  </style>
</head>
<body>
  <main class="poster" id="app"></main>
  <script>
    const params = new URLSearchParams(location.search);
    const screen = params.get("screen") || "discover";
    const content = {
      discover: {
        title: "Everything you watch and read in one app",
        copy: "Anime, manga, novels, cartoons, K-drama and movies with account sync.",
        body: `
          <div class="topbar"><div class="screen-title">Discover</div><span class="pill">Synced account</span></div>
          <div class="tabs"><span class="tab active">Novels</span><span class="tab">Manga</span><span class="tab">Anime</span><span class="tab">K-Drama</span></div>
          <div class="search">Search stories, shows, movies...</div>
          <div class="grid">
            ${card("A Will Eternal", "Wuxiaworld", "A")}
            ${card("Chainsaw Man", "MangaDex", "C")}
            ${card("Solo Leveling", "Anime", "S")}
            ${card("Crash Landing", "K-Drama", "K")}
          </div>`
      },
      manga: {
        title: "Read manga in a dark full-screen viewer",
        copy: "Pages appear while the next pages cache in the background.",
        body: `
          <div class="topbar"><div class="screen-title">Chainsaw Man</div><span class="pill">Webtoon dark</span></div>
          <div class="manga-page"><div class="panel-art"></div><div class="panel-art"></div></div>
          <div class="mini-caption">Chapter 1 - 53 real image pages loaded</div>`
      },
      novel: {
        title: "Listen to novels with smooth narration",
        copy: "Kokoro voice support, highlighting and reading history built in.",
        body: `
          <div class="topbar"><div class="screen-title">Mother of Learning</div><span class="pill">Kokoro</span></div>
          <div class="reader-page">
            <div class="reader-title">Chapter 1</div>
            <div class="reader-line mid"></div>
            <div class="reader-line"></div>
            <div class="reader-line short"></div>
            <div class="reader-line hot"></div>
            <div class="reader-line mid"></div>
            <div class="reader-line"></div>
            <div class="reader-line short"></div>
            <div class="reader-line"></div>
            <div class="reader-line mid"></div>
          </div>
          <div class="server active"><span>Reading aloud</span><span>72%</span></div>`
      },
      video: {
        title: "Switch servers when one provider is slow",
        copy: "VidLink, AutoEmbed, VidSrc and source hosts are available from the player.",
        body: `
          <div class="topbar"><div class="screen-title">Watch</div><span class="pill">Multiple servers</span></div>
          <div class="player">
            <div class="server active"><span>VidLink</span><span>Ready</span></div>
            <div class="play">&#9654;</div>
            <div class="mini-caption">K-Drama, cartoons, movies and anime</div>
          </div>
          <div class="servers">
            <div class="server"><span>AutoEmbed</span><span>Server 2</span></div>
            <div class="server"><span>VidSrc.me</span><span>Server 3</span></div>
          </div>`
      },
      account: {
        title: "Keep your account, favorites and history synced",
        copy: "Favorites, reading history, watch history and recent searches follow your login.",
        body: `
          <div class="topbar"><div class="screen-title">You</div><span class="pill">Premium ready</span></div>
          <div class="profile"><div class="avatar">A</div><div><div class="cover-title">Alex Reader</div><div class="cover-meta">alex@example.com</div></div></div>
          <div class="sync-list">
            <div class="sync-row"><span>Favorites</span><span style="color: var(--accent)">Synced</span></div>
            <div class="sync-row"><span>Continue reading</span><span>3 items</span></div>
            <div class="sync-row"><span>Continue watching</span><span>5 items</span></div>
            <div class="sync-row"><span>Last searches</span><span>Per tab</span></div>
          </div>`
      },
      update: {
        title: "Updates arrive inside the app",
        copy: "Download progress, checksum verification and installer handoff are built in.",
        body: `
          <div class="topbar"><div class="screen-title">App update</div><span class="pill">Version 1.11</span></div>
          <div class="progress-box">
            <div class="cover-title">Downloading update</div>
            <div class="cover-meta">Safe direct APK update from the official site</div>
            <div class="progress-track"><div class="progress-fill"></div></div>
            <div class="server active"><span>Verifying SHA-256</span><span>72%</span></div>
            <div class="server"><span>Open Android installer</span><span>Next</span></div>
          </div>`
      }
    };

    function card(title, source, letter) {
      return `<div class="cover-card"><div class="cover-art">${letter}</div><div class="cover-body"><div class="cover-title">${title}</div><div class="cover-meta">${source}</div></div></div>`;
    }

    const item = content[screen] || content.discover;
    document.getElementById("app").innerHTML = `
      <section>
        <div class="brand">
          <div class="logo">N</div>
          <div><div class="brand-name">Anime / Novel / Manga</div><div class="brand-sub">All in One</div></div>
        </div>
        <h1 class="hero-title">${item.title}</h1>
        <p class="hero-copy">${item.copy}</p>
      </section>
      <section class="phone-wrap">
        <div class="phone">
          <div class="status"><span>9:41</span><span>5G 100%</span></div>
          <div class="screen">${item.body}</div>
        </div>
      </section>
      <section class="footer">
        <div class="download">Download APK</div>
        <div class="url">novelapp1.onrender.com</div>
      </section>`;
  </script>
</body>
</html>
