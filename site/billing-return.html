<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NovelApp Premium</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: #121212;
        --text: #f4f4f5;
        --muted: #a1a1aa;
        --accent: #f97316;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(92vw, 460px);
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }
      p {
        color: var(--muted);
        line-height: 1.55;
      }
      .status {
        margin-top: 16px;
        color: var(--accent);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NovelApp Premium</h1>
      <p id="message">Verifying your Flutterwave payment...</p>
      <div class="status" id="status">Please wait</div>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const transactionId = params.get("transaction_id") || params.get("id");
      const txRef = params.get("tx_ref");
      const status = document.getElementById("status");
      const message = document.getElementById("message");

      async function verify() {
        if (!transactionId && !txRef) {
          status.textContent = "Payment reference missing";
          message.textContent = "Flutterwave did not send a payment reference. Open NovelApp and try the Premium button again.";
          return;
        }
        try {
          const response = await fetch("/api/billing/verify", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ transactionId, txRef })
          });
          const body = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(body.error || "Payment verification failed.");
          status.textContent = "Premium activated";
          message.textContent = "Your subscription is active. Reopen NovelApp or sign in again if the app has not refreshed yet.";
        } catch (error) {
          status.textContent = "Verification failed";
          message.textContent = error.message || "Could not verify this payment. Open NovelApp and try refreshing your account.";
        }
      }

      verify();
    </script>
  </body>
</html>
