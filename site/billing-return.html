<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NovelApp Premium</title>
    <style>
         :root {
            color-scheme: dark;
            --bg: #050505;
            --panel: #121212;
            --text: #f4f4f5;
            --muted: #a1a1aa;
            --accent: #f97316;
        }
        
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        
        main {
            width: min(92vw, 460px);
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        
        h1 {
            margin: 0 0 10px;
            font-size: 24px;
        }
        
        p {
            color: var(--muted);
            line-height: 1.55;
        }
        
        .status {
            margin-top: 16px;
            color: var(--accent);
            font-weight: 700;
        }
        
        .btn-app {
            display: inline-block;
            margin-top: 24px;
            padding: 14px 32px;
            background: var(--accent);
            color: #000;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            font-size: 16px;
        }
        
        .btn-app:hover {
            opacity: 0.85;
        }
        
        .fallback-link {
            margin-top: 12px;
            display: block;
            color: var(--muted);
            font-size: 13px;
        }
    </style>
</head>

<body>
    <main>
        <h1>NovelApp Premium</h1>
        <p id="message">Verifying your Flutterwave payment...</p>
        <div class="status" id="status">Please wait</div>
        <a class="btn-app" href="novelapp://premium" id="openAppBtn" style="display:none">Open NovelApp</a>
        <a class="fallback-link" href="#" id="fallbackLink" style="display:none">Tap here to refresh your account in the app</a>
    </main>
    <script>
        const params = new URLSearchParams(window.location.search);
        const transactionId = params.get("transaction_id") || params.get("id");
        const txRef = params.get("tx_ref");
        const status = document.getElementById("status");
        const message = document.getElementById("message");
        const openAppBtn = document.getElementById("openAppBtn");
        const fallbackLink = document.getElementById("fallbackLink");

        // Try to redirect back to the app using deep link or custom scheme
        // The priority order is:
        //   1. Custom scheme (novelapp://) — opens the app directly on both Android and iOS
        //   2. Android intent URL — explicit Android intent
        //   3. HTTP deep link — falls back to browser if app not installed
        function redirectToApp() {
            const appLinks = [
                "novelapp://premium",
                "novelapp://open",
                "intent://premium#Intent;scheme=novelapp;package=com.alexleoreeves.novelapp;end",
                "https://novelapp1.onrender.com/app-version.json?premium=activated"
            ];
            // Use the first link immediately (most reliable on Android/iOS)
            // Custom scheme "novelapp://" works both on Android via intent and iOS via CFBundleURLSchemes
            try {
                window.location.href = appLinks[0];
            } catch (e) {}
            // Fallback attempts with delays
            appLinks.slice(1).forEach((link, index) => {
                setTimeout(() => {
                    try {
                        window.location.href = link;
                    } catch (e) {}
                }, (index + 1) * 400);
            });
        }

        async function verify() {
            if (!transactionId && !txRef) {
                status.textContent = "Payment reference missing";
                message.textContent = "Flutterwave did not send a payment reference. Open NovelApp and try the Premium button again.";
                openAppBtn.style.display = "inline-block";
                fallbackLink.style.display = "block";
                fallbackLink.onclick = function(e) {
                    e.preventDefault();
                    redirectToApp();
                };
                return;
            }
            try {
                const response = await fetch("/api/billing/verify", {
                    method: "POST",
                    headers: {
                        "content-type": "application/json"
                    },
                    body: JSON.stringify({
                        transactionId,
                        txRef
                    })
                });
                const body = await response.json().catch(() => ({}));
                if (!response.ok) throw new Error(body.error || "Payment verification failed.");

                status.textContent = "Premium activated!";
                message.textContent = "Your subscription is active. Reopen the app to enjoy full access.";
                openAppBtn.style.display = "inline-block";
                fallbackLink.style.display = "block";
                fallbackLink.onclick = function(e) {
                    e.preventDefault();
                    redirectToApp();
                };

                // Auto-redirect to app after 2 seconds
                setTimeout(redirectToApp, 2000);
            } catch (error) {
                status.textContent = "Verification failed";
                message.textContent = error.message || "Could not verify this payment. Open NovelApp and try refreshing your account.";
                openAppBtn.style.display = "inline-block";
                fallbackLink.style.display = "block";
                fallbackLink.onclick = function(e) {
                    e.preventDefault();
                    redirectToApp();
                };

                // Auto-redirect to app anyway after 3 seconds
                setTimeout(redirectToApp, 3000);
            }
        }

        verify();
    </script>
</body>

</html>
