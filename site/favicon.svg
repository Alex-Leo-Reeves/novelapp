<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" role="img" aria-labelledby="title desc">
  <title id="title">NovelApp icon</title>
  <desc id="desc">A 3D open book with glowing neon accents</desc>
  
  <defs>
    <radialGradient id="baseBg" cx="30%" cy="25%" r="80%" fx="25%" fy="20%">
      <stop offset="0%" stop-color="#1a2040"/>
      <stop offset="50%" stop-color="#0d1122"/>
      <stop offset="100%" stop-color="#060810"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#ff1493" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#00ffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leftCover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6eb4"/>
      <stop offset="40%" stop-color="#ff1493"/>
      <stop offset="100%" stop-color="#b30068"/>
    </linearGradient>
    <linearGradient id="rightCover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66ffff"/>
      <stop offset="40%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
    <linearGradient id="leftPage" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffe0f0" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="rightPage" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e0ffff" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="spineShadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="40%" stop-color="#000" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <filter id="bookShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#ff1493" flood-opacity="0.3"/>
      <feDropShadow dx="2" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe44d"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#cc9900"/>
    </linearGradient>
    <filter id="playShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="glossHighlight" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="pageInsetShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="108" height="108" rx="24" fill="url(#baseBg)"/>
  <rect x="1" y="1" width="106" height="106" rx="23" fill="none" stroke="#fff" stroke-opacity="0.08" stroke-width="2"/>
  <circle cx="54" cy="50" r="44" fill="url(#innerGlow)"/>
  
  <g filter="url(#bookShadow)">
    <rect x="32" y="22" width="44" height="64" rx="4" fill="#1a1a2e" opacity="0.4"/>
    <path d="M20 26 C20 20 26 16 32 16 L48 16 L48 74 L32 74 C26 74 20 68 20 62 L20 26 Z" fill="url(#leftPage)" filter="url(#pageInsetShadow)"/>
    <path d="M88 26 C88 20 82 16 76 16 L60 16 L60 74 L76 74 C82 74 88 68 88 62 L88 26 Z" fill="url(#rightPage)" filter="url(#pageInsetShadow)"/>
    <path d="M20 26 C20 20 26 16 32 16 L48 16 L48 78 L32 78 C26 78 20 72 20 66 L20 26 Z" fill="none" stroke="url(#leftCover)" stroke-width="5" stroke-linejoin="round"/>
    <path d="M88 26 C88 20 82 16 76 16 L60 16 L60 78 L76 78 C82 78 88 72 88 66 L88 26 Z" fill="none" stroke="url(#rightCover)" stroke-width="5" stroke-linejoin="round"/>
    <rect x="46" y="16" width="16" height="62" fill="url(#spineShadow)"/>
    
    <g fill="#333" opacity="0.25">
      <rect x="28" y="30" width="14" height="2" rx="1"/>
      <rect x="28" y="36" width="11" height="2" rx="1"/>
      <rect x="28" y="42" width="15" height="2" rx="1"/>
      <rect x="28" y="48" width="10" height="2" rx="1"/>
      <rect x="28" y="54" width="13" height="2" rx="1"/>
      <rect x="28" y="60" width="8" height="2" rx="1"/>
    </g>
    <g fill="#333" opacity="0.25">
      <rect x="62" y="30" width="14" height="2" rx="1"/>
      <rect x="62" y="36" width="11" height="2" rx="1"/>
      <rect x="62" y="42" width="15" height="2" rx="1"/>
      <rect x="62" y="48" width="10" height="2" rx="1"/>
      <rect x="62" y="54" width="13" height="2" rx="1"/>
      <rect x="62" y="60" width="8" height="2" rx="1"/>
    </g>
  </g>

  <g filter="url(#playShadow)">
    <circle cx="54" cy="48" r="15" fill="url(#playGrad)"/>
    <circle cx="54" cy="48" r="15" fill="#fff" opacity="0.1"/>
    <path d="M43 40 A12 12 0 0 1 65 40" fill="none" stroke="#fff" stroke-opacity="0.3" stroke-width="2"/>
    <path d="M47 39 L47 57 L60 48 Z" fill="#fff" opacity="0.92"/>
    <path d="M47 39 L47 57 L60 48 Z" fill="#ffeeaa" opacity="0.3"/>
  </g>

  <rect x="0" y="0" width="108" height="108" rx="24" fill="url(#glossHighlight)"/>
  <rect x="0" y="0" width="108" height="108" rx="24" fill="none" stroke="#ff1493" stroke-opacity="0.15" stroke-width="1.5"/>
  
  <g fill="#fff" opacity="0.6">
    <circle cx="86" cy="22" r="3"/>
    <circle cx="92" cy="18" r="1.5" opacity="0.4"/>
    <circle cx="82" cy="17" r="1.2" opacity="0.3"/>
  </g>
  <g fill="#00ffff" opacity="0.35">
    <circle cx="20" cy="86" r="2.5"/>
    <circle cx="16" cy="90" r="1" opacity="0.5"/>
  </g>
</svg>
