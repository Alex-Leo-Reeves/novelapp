name: NovaRead TV
options:
  bundleIdPrefix: com.alexleoreeves
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
settings:
  base:
    CURRENT_PROJECT_VERSION: 38
    MARKETING_VERSION: "1.38"
    SWIFT_VERSION: "5.0"
targets:
  NovaRead TV:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: iosApp
      - path: Assets.xcassets
      - path: LaunchScreen.storyboard
      - path: ../kokoro-assets/kokoro
        type: folder
        buildPhase: resources
    info:
      path: Info.plist
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: Info.plist
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        PRODUCT_BUNDLE_IDENTIFIER: com.alexleoreeves.novelapp.ios
        PRODUCT_NAME: NovaRead TV
    dependencies:
      - framework: onnxruntime.xcframework
        embed: true
schemes:
  NovaRead TV:
    build:
      targets:
        NovaRead TV: all
    run:
      config: Debug
    archive:
      config: Release
