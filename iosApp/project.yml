name: AnimeNovelManga
options:
  bundleIdPrefix: com.alexleoreeves
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
settings:
  base:
    CURRENT_PROJECT_VERSION: 10
    MARKETING_VERSION: "1.9"
    SWIFT_VERSION: "5.0"
targets:
  AnimeNovelManga:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: iosApp
      - path: Assets.xcassets
      - path: LaunchScreen.storyboard
      - path: ../kokoro-assets-lite/kokoro
        type: folder
        buildPhase: resources
    info:
      path: Info.plist
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: Info.plist
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)"
          - "$(SRCROOT)/../composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        PRODUCT_BUNDLE_IDENTIFIER: com.alexleoreeves.novelapp.ios
        PRODUCT_NAME: AnimeNovelManga
    preBuildScripts:
      - name: Build ComposeApp Framework
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT/.."
          ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode
    dependencies:
      - framework: ../composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/ComposeApp.framework
        embed: true
      - framework: onnxruntime.xcframework
        embed: true
schemes:
  AnimeNovelManga:
    build:
      targets:
        AnimeNovelManga: all
    run:
      config: Debug
    archive:
      config: Release
